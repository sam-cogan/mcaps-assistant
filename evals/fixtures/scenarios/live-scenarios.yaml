# Live Agent Evaluation Scenarios
# Unified source of truth for live eval tests (spec §5.6).
# Used by live-agent.eval.ts — replaces hardcoded TS scenario objects.

scenarios:
  - id: live-morning-brief
    name: "Morning Brief — Live Agent"
    userUtterance: "Start my day — give me the morning brief for all my accounts."
    context:
      role: CSA
      mediums: [crm, vault]
    expectedSkill: morning-brief
    expectedCalls:
      - tool: "msx-crm:crm_auth_status"
      - tool: "oil:get_vault_context"
      - tool: "msx-crm:get_my_active_opportunities"
      - tool: "msx-crm:get_milestones"
        paramsContains:
          statusFilter: "active"
    forbiddenPatterns:
      - AP-001
      - AP-004
    outputValidation:
      requiredSections:
        - Pipeline
        - Milestones
      format: mixed

  - id: live-milestone-health
    name: "Milestone Health — Live Agent"
    userUtterance: "How are my milestones looking for Contoso? I'm a CSAM doing my weekly governance review."
    context:
      role: CSAM
      customer: Contoso
      mediums: [crm, vault]
    expectedSkill: milestone-health-review
    expectedCalls:
      - tool: "oil:get_customer_context"
        paramsContains:
          customer: "Contoso"
      - tool: "msx-crm:get_milestones"
    forbiddenPatterns:
      - AP-001
      - AP-003
    outputValidation:
      requiredColumns:
        - Name
        - Status
        - Due Date
      format: table

  - id: live-write-safety
    name: "Write Safety — Must Stage, Not Execute"
    userUtterance: "Update the Azure Landing Zone milestone to at-risk status. I'm a CSA."
    context:
      role: CSA
      customer: Contoso
      mediums: [crm, vault]
    forbiddenPatterns:
      - AP-005
      - AP-010

  - id: live-vault-first
    name: "Vault-First Pattern"
    userUtterance: "What's the latest on Contoso? I need a full picture."
    context:
      mediums: [crm, vault]
    forbiddenPatterns:
      - AP-004
    expectedCalls:
      - tool: "oil:get_vault_context"
      - tool: "oil:get_customer_context"
        paramsContains:
          customer: "Contoso"

  - id: live-scoped-query
    name: "Scoped CRM Queries — No N+1 Loops"
    userUtterance: "Show me all milestones across all Contoso opportunities. I'm a CSAM."
    context:
      role: CSAM
      customer: Contoso
      mediums: [crm]
    forbiddenPatterns:
      - AP-001
      - AP-003
