cases:
  # ── CSAM scenarios ──────────────────────────────────────────────
  - id: csam-milestone-health
    query: "What's the milestone health for Contoso?"
    role: CSAM
    stage: 4
    expected: [milestone-health-review/SKILL.md]
    not_expected:
      - pipeline-qualification/SKILL.md
      - proof-plan-orchestration/SKILL.md

  - id: csam-value-realization
    query: "What value has the customer realized from our delivery?"
    role: CSAM
    stage: 5
    expected: [value-realization-pack/SKILL.md]
    not_expected:
      - pipeline-hygiene-triage/SKILL.md
      - task-hygiene-flow/SKILL.md

  - id: csam-expansion-signal
    query: "Are there expansion signals we should pursue for this account?"
    role: CSAM
    stage: 5
    expected: [expansion-signal-routing/SKILL.md]
    not_expected:
      - pipeline-qualification/SKILL.md
      - architecture-feasibility-check/SKILL.md

  # ── SE scenarios ────────────────────────────────────────────────
  - id: se-proof-plan
